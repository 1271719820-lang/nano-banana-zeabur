<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>天才新星 - AI图像生成</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg-primary: #0a0a0a;
            --bg-secondary: #0f0f0f;
            --bg-card: #0f0f0f;
            --bg-header: #0a0a0a;
            --border-color: #222;
            --text-primary: #e0e0e0;
            --text-secondary: #aaa;
            --text-muted: #666;
            --accent: #a85ff7;
            --accent-gradient: linear-gradient(135deg, #a85ff7, #7c3aed);
        }

        body.white-theme {
            --bg-primary: #f5f5f5;
            --bg-secondary: #ffffff;
            --bg-card: #ffffff;
            --bg-header: #f8f8f8;
            --border-color: #e0e0e0;
            --text-primary: #333333;
            --text-secondary: #666666;
            --text-muted: #999999;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
            background: var(--bg-primary);
            min-height: 100vh;
            color: var(--text-primary);
            transition: background 0.3s ease;
        }

        .login-container {
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: var(--bg-primary);
        }

        .login-card {
            background: var(--bg-card);
            border-radius: 24px;
            border: 1px solid var(--border-color);
            padding: 40px;
            width: 100%;
            max-width: 420px;
            text-align: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        }

        .login-card h1 {
            font-size: 2rem;
            margin-bottom: 10px;
            background: var(--accent-gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .login-card p {
            color: var(--text-secondary);
            margin-bottom: 30px;
        }

        .password-input {
            width: 100%;
            padding: 14px 16px;
            background: var(--bg-primary);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            color: var(--text-primary);
            font-size: 1rem;
            margin-bottom: 20px;
            outline: none;
        }

        .password-input:focus {
            border-color: var(--accent);
        }

        .login-btn {
            width: 100%;
            padding: 14px;
            background: var(--accent-gradient);
            border: none;
            border-radius: 12px;
            color: white;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: 0.2s;
        }

        .login-btn:hover {
            opacity: 0.9;
        }

        .login-error {
            color: #f44336;
            font-size: 0.8rem;
            margin-top: 15px;
        }

        .main-app {
            display: none;
        }

        .top-bar {
            background: var(--bg-secondary);
            border-bottom: 1px solid var(--border-color);
            padding: 12px 24px;
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .top-content {
            max-width: 1400px;
            margin: 0 auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 16px;
        }

        .logo {
            font-size: 1.5rem;
            font-weight: 700;
            background: var(--accent-gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .badge {
            background: var(--bg-primary);
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.7rem;
            color: var(--accent);
            border: 1px solid var(--border-color);
        }

        .user-info {
            background: var(--bg-primary);
            padding: 6px 14px;
            border-radius: 40px;
            font-size: 0.8rem;
            display: flex;
            align-items: center;
            gap: 8px;
            border: 1px solid var(--border-color);
        }

        .logout-btn, .theme-toggle {
            background: var(--bg-primary);
            border: 1px solid var(--border-color);
            padding: 6px 12px;
            border-radius: 20px;
            cursor: pointer;
            font-size: 0.7rem;
            color: var(--accent);
        }

        .main-container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 24px;
            display: grid;
            grid-template-columns: 280px 1fr 300px;
            gap: 20px;
        }

        .sidebar-left {
            background: var(--bg-card);
            border-radius: 20px;
            border: 1px solid var(--border-color);
            padding: 20px;
            height: fit-content;
        }

        .sidebar-left h3 {
            font-size: 0.8rem;
            color: var(--text-secondary);
            margin-bottom: 16px;
            text-transform: uppercase;
        }

        .model-select {
            width: 100%;
            background: var(--bg-primary);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 12px;
            color: var(--text-primary);
            font-size: 0.85rem;
            margin-bottom: 16px;
            cursor: pointer;
            outline: none;
        }

        .model-price {
            font-size: 0.65rem;
            color: #10b981;
            margin-top: 8px;
            padding-top: 8px;
            border-top: 1px solid var(--border-color);
        }

        .main-content {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .input-card {
            background: var(--bg-card);
            border-radius: 20px;
            border: 1px solid var(--border-color);
            overflow: hidden;
        }

        .input-card-header {
            padding: 14px 20px;
            border-bottom: 1px solid var(--border-color);
            background: var(--bg-header);
        }

        .input-card-header h3 {
            font-size: 0.85rem;
            font-weight: 600;
            color: var(--text-secondary);
        }

        .input-row {
            display: flex;
            gap: 16px;
            padding: 20px;
        }

        .ref-section {
            flex: 1;
            min-width: 150px;
        }

        .ref-section .section-label {
            font-size: 0.75rem;
            color: var(--text-secondary);
            margin-bottom: 12px;
        }

        .upload-area {
            border: 2px dashed var(--border-color);
            border-radius: 16px;
            padding: 16px;
            text-align: center;
            cursor: pointer;
            background: var(--bg-primary);
            transition: 0.2s;
        }

        .upload-area:hover {
            border-color: var(--accent);
        }

        .paste-hint {
            font-size: 0.7rem;
            color: var(--text-muted);
            margin-top: 8px;
        }

        .ref-list {
            display: flex;
            flex-direction: column;
            gap: 8px;
            margin-top: 12px;
            max-height: 300px;
            overflow-y: auto;
        }

        .ref-item {
            display: flex;
            align-items: center;
            gap: 10px;
            background: var(--bg-primary);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 8px;
            cursor: grab;
        }

        .ref-item .drag-handle {
            cursor: grab;
            color: var(--text-muted);
            font-size: 16px;
        }

        .ref-item img {
            width: 50px;
            height: 50px;
            object-fit: cover;
            border-radius: 8px;
            cursor: pointer;
        }

        .ref-item .ref-info {
            flex: 1;
            font-size: 0.7rem;
            color: var(--text-secondary);
        }

        .ref-item .remove-ref {
            background: none;
            border: none;
            color: #f44336;
            cursor: pointer;
            font-size: 16px;
        }

        .clear-ref-btn {
            background: var(--bg-primary);
            border: 1px solid var(--border-color);
            padding: 6px 12px;
            border-radius: 20px;
            margin-top: 12px;
            cursor: pointer;
            font-size: 0.7rem;
            width: 100%;
            color: var(--text-secondary);
        }

        .prompt-section {
            flex: 3;
        }

        .prompt-section .section-label {
            font-size: 0.75rem;
            color: var(--text-secondary);
            margin-bottom: 12px;
        }

        .prompt-input {
            width: 100%;
            min-height: 180px;
            background: var(--bg-primary);
            border: 1px solid var(--border-color);
            border-radius: 16px;
            padding: 14px;
            color: var(--text-primary);
            font-size: 0.9rem;
            font-family: inherit;
            resize: vertical;
            outline: none;
        }

        .prompt-input:focus {
            border-color: var(--accent);
        }

        .char-count {
            font-size: 0.7rem;
            color: var(--text-muted);
            text-align: right;
            margin-top: 10px;
        }

        .card {
            background: var(--bg-card);
            border-radius: 20px;
            border: 1px solid var(--border-color);
            overflow: hidden;
        }

        .card-header {
            padding: 14px 20px;
            border-bottom: 1px solid var(--border-color);
            background: var(--bg-header);
        }

        .card-header h3 {
            font-size: 0.85rem;
            font-weight: 600;
            color: var(--text-secondary);
        }

        .card-content {
            padding: 20px;
        }

        .size-options {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin-bottom: 20px;
        }

        .size-btn {
            background: var(--bg-primary);
            border: 1px solid var(--border-color);
            border-radius: 40px;
            padding: 6px 14px;
            cursor: pointer;
            font-size: 0.75rem;
            color: var(--text-secondary);
            transition: 0.2s;
        }

        .size-btn.active {
            background: var(--accent-gradient);
            border-color: transparent;
            color: white;
        }

        .ratio-grid {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
        }

        .ratio-btn {
            background: var(--bg-primary);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 8px 12px;
            cursor: pointer;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 6px;
            min-width: 65px;
            color: var(--text-secondary);
            transition: 0.2s;
        }

        .ratio-btn.active {
            background: var(--accent-gradient);
            border-color: transparent;
            color: white;
        }

        .ratio-icon {
            width: 32px;
            height: 32px;
            border: 2px solid var(--text-secondary);
            border-radius: 6px;
        }

        .ratio-icon[data-ratio="1:1"] { width: 28px; height: 28px; }
        .ratio-icon[data-ratio="16:9"] { width: 36px; height: 20px; }
        .ratio-icon[data-ratio="9:16"] { width: 20px; height: 36px; }
        .ratio-icon[data-ratio="4:3"] { width: 32px; height: 24px; }
        .ratio-icon[data-ratio="3:4"] { width: 24px; height: 32px; }
        .ratio-icon[data-ratio="3:2"] { width: 36px; height: 24px; }
        .ratio-icon[data-ratio="2:3"] { width: 24px; height: 36px; }
        .ratio-icon[data-ratio="21:9"] { width: 42px; height: 18px; }

        .generate-btn {
            width: 100%;
            background: var(--accent-gradient);
            border: none;
            border-radius: 16px;
            padding: 16px;
            color: white;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: 0.2s;
        }

        .generate-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .result-area {
            background: var(--bg-card);
            border-radius: 20px;
            border: 1px solid var(--border-color);
            overflow: hidden;
            display: flex;
            flex-direction: column;
            gap: 16px;
            padding: 16px;
        }

        .result-item {
            background: var(--bg-secondary);
            border-radius: 16px;
            border: 1px solid var(--border-color);
            overflow: hidden;
        }

        .result-header {
            padding: 12px 16px;
            border-bottom: 1px solid var(--border-color);
            font-size: 0.8rem;
            font-weight: 500;
            color: var(--text-secondary);
        }

        .result-image {
            text-align: center;
            padding: 20px;
        }

        .result-image img {
            max-width: 100%;
            max-height: 600px;
            border-radius: 12px;
            cursor: pointer;
        }

        .result-text {
            padding: 16px;
            font-size: 0.85rem;
            line-height: 1.5;
        }

        .sidebar-right {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .stats-card, .history-card {
            background: var(--bg-card);
            border-radius: 20px;
            border: 1px solid var(--border-color);
            padding: 20px;
        }

        .stats-title {
            font-size: 0.7rem;
            color: var(--text-muted);
            text-transform: uppercase;
            margin-bottom: 16px;
        }

        .stats-item {
            display: flex;
            justify-content: space-between;
            padding: 10px 0;
            border-bottom: 1px solid var(--border-color);
        }

        .stats-value {
            font-weight: 600;
            color: var(--accent);
        }

        .history-header {
            display: flex;
            justify-content: space-between;
            margin-bottom: 16px;
        }

        .clear-history {
            background: var(--bg-primary);
            border: 1px solid var(--border-color);
            padding: 4px 12px;
            border-radius: 20px;
            color: #f44336;
            cursor: pointer;
            font-size: 0.7rem;
        }

        .history-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 12px;
            max-height: 400px;
            overflow-y: auto;
        }

        .history-img-item {
            position: relative;
            aspect-ratio: 1;
            border-radius: 12px;
            overflow: hidden;
            border: 1px solid var(--border-color);
            cursor: pointer;
        }

        .history-img-item img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .history-img-item .history-prompt {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            background: linear-gradient(transparent, rgba(0,0,0,0.8));
            padding: 6px;
            font-size: 0.6rem;
            color: white;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .loading {
            text-align: center;
            padding: 40px;
        }

        .spinner {
            width: 40px;
            height: 40px;
            border: 3px solid var(--border-color);
            border-top-color: var(--accent);
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 16px;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .error {
            background: rgba(244,67,54,0.1);
            border: 1px solid #f44336;
            border-radius: 12px;
            padding: 16px;
            color: #f44336;
            text-align: center;
        }

        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.95);
            z-index: 1000;
            justify-content: center;
            align-items: center;
        }

        .modal-img {
            max-width: 95%;
            max-height: 95vh;
            object-fit: contain;
            transition: transform 0.2s;
        }

        .modal-close {
            position: absolute;
            top: 20px;
            right: 30px;
            font-size: 40px;
            color: white;
            cursor: pointer;
            z-index: 1001;
        }

        .zoom-controls {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0,0,0,0.7);
            padding: 8px 16px;
            border-radius: 30px;
            display: flex;
            gap: 16px;
            color: white;
        }

        .zoom-controls button {
            background: none;
            border: none;
            color: white;
            font-size: 18px;
            cursor: pointer;
        }

        @media (max-width: 1000px) {
            .main-container {
                grid-template-columns: 1fr;
            }
            .input-row {
                flex-direction: column;
            }
        }
    </style>
</head>
<body>

    <div class="login-container" id="loginContainer">
        <div class="login-card">
            <h1>✨ 天才新星</h1>
            <p>AI 图像生成 · 密码登录</p>
            <input type="password" id="passwordInput" class="password-input" placeholder="请输入访问密码" onkeypress="if(event.key==='Enter')login()">
            <button class="login-btn" onclick="login()">🔓 进入系统</button>
            <div id="loginError" class="login-error"></div>
        </div>
    </div>

    <div class="main-app" id="mainApp">
        <div class="top-bar">
            <div class="top-content">
                <div style="display:flex;align-items:center;gap:12px;">
                    <span class="logo">✨ 天才新星</span>
                    <span class="badge">稳定版</span>
                </div>
                <div style="display:flex;gap:12px;">
                    <div class="user-info">
                        <span>👤 <span id="userName">用户</span></span>
                        <span>💰 <span id="credits">0</span> 积分</span>
                        <button class="logout-btn" onclick="logout()">退出</button>
                    </div>
                    <button class="theme-toggle" onclick="toggleTheme()" id="themeToggle">🌙 深色</button>
                </div>
            </div>
        </div>

        <div class="main-container">
            <div class="sidebar-left">
                <h3>🤖 选择模型</h3>
                <select id="modelSelect" class="model-select">
                    <option value="nano-banana-fast">⚡ Nano Banana Fast (省钱稳定)</option>
                    <option value="nano-banana-pro">✨ Nano Banana Pro (高质量)</option>
                    <option value="nano-banana-2">🍌 Nano Banana 2 (均衡)</option>
                </select>
                <div class="model-price">💡 所需积分自动计算</div>
            </div>

            <div class="main-content">
                <div class="input-card">
                    <div class="input-card-header"><h3>📝 生成描述</h3></div>
                    <div class="input-row">
                        <div class="ref-section">
                            <div class="section-label">🖼️ 参考图（最多3张）</div>
                            <div class="upload-area" onclick="document.getElementById('fileInput').click()">
                                📸 点击上传<br><small>拖拽排序 / 双击预览</small>
                            </div>
                            <div class="paste-hint">💡 支持 Ctrl+V 粘贴图片</div>
                            <input type="file" id="fileInput" multiple accept="image/*" style="display:none" onchange="handleImageUpload(this.files)">
                            <div class="ref-list" id="refList"></div>
                            <button class="clear-ref-btn" onclick="clearAllImages()">🗑️ 清空所有</button>
                        </div>
                        <div class="prompt-section">
                            <div class="section-label">✍️ 提示词</div>
                            <textarea id="promptInput" class="prompt-input" placeholder="描述你想要生成的画面..."></textarea>
                            <div class="char-count"><span id="charCount">0</span>/2000</div>
                        </div>
                    </div>
                </div>

                <div class="card">
                    <div class="card-header"><h3>🎨 画质 & 比例</h3></div>
                    <div class="card-content">
                        <div class="size-options" id="sizeOptions">
                            <div class="size-btn" data-size="1K">1K 标准</div>
                            <div class="size-btn active" data-size="2K">2K 高清</div>
                            <div class="size-btn" data-size="4K">4K 超清</div>
                        </div>
                        <div class="ratio-grid" id="ratioOptions">
                            <div class="ratio-btn active" data-ratio="1:1"><div class="ratio-icon" data-ratio="1:1"></div><span>1:1</span></div>
                            <div class="ratio-btn" data-ratio="16:9"><div class="ratio-icon" data-ratio="16:9"></div><span>16:9</span></div>
                            <div class="ratio-btn" data-ratio="9:16"><div class="ratio-icon" data-ratio="9:16"></div><span>9:16</span></div>
                            <div class="ratio-btn" data-ratio="4:3"><div class="ratio-icon" data-ratio="4:3"></div><span>4:3</span></div>
                            <div class="ratio-btn" data-ratio="3:4"><div class="ratio-icon" data-ratio="3:4"></div><span>3:4</span></div>
                            <div class="ratio-btn" data-ratio="3:2"><div class="ratio-icon" data-ratio="3:2"></div><span>3:2</span></div>
                            <div class="ratio-btn" data-ratio="2:3"><div class="ratio-icon" data-ratio="2:3"></div><span>2:3</span></div>
                            <div class="ratio-btn" data-ratio="21:9"><div class="ratio-icon" data-ratio="21:9"></div><span>21:9</span></div>
                        </div>
                    </div>
                </div>

                <button class="generate-btn" id="generateBtn" onclick="generateImage()">🚀 开始生成图像</button>

                <div class="result-area" id="resultArea"></div>
            </div>

            <div class="sidebar-right">
                <div class="stats-card">
                    <div class="stats-title">📊 我的信息</div>
                    <div class="stats-item"><span>当前积分</span><span class="stats-value" id="creditValue">0</span></div>
                    <div class="stats-item"><span>总生成次数</span><span class="stats-value" id="totalGenerated">0</span></div>
                </div>
                <div class="history-card">
                    <div class="history-header">
                        <span class="stats-title">📜 历史记录</span>
                        <button class="clear-history" onclick="clearHistory()">清空</button>
                    </div>
                    <div id="historyList" class="history-grid">
                        <div style="grid-column:1/-1;text-align:center;padding:20px;color:var(--text-muted)">暂无记录</div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div class="modal" id="imageModal" onclick="closeModal(event)">
        <span class="modal-close" onclick="closeModal()">&times;</span>
        <img class="modal-img" id="modalImage" src="">
        <div class="zoom-controls">
            <button onclick="zoomIn(event)">🔍+</button>
            <span id="zoomLevel">100%</span>
            <button onclick="zoomOut(event)">🔍-</button>
            <button onclick="resetZoom(event)">⟳ 重置</button>
        </div>
    </div>

<script>
    let currentPassword = null;
    let selectedSize = '2K';
    let selectedRatio = '1:1';
    let selectedModel = 'nano-banana-fast';
    let uploadedImages = [];
    let historyImages = [];
    let currentZoom = 1;
    let dragIndex = null;
    let activeRequests = 0;

    const modelPricing = {
        'nano-banana-fast': { '1K':4,'2K':5,'4K':6 },
        'nano-banana-pro': { '1K':6,'2K':8,'4K':12 },
        'nano-banana-2': { '1K':4,'2K':6,'4K':10 }
    };

    function updateButtonCost() {
        const cost = modelPricing[selectedModel]?.[selectedSize] || 0;
        const btn = document.getElementById('generateBtn');
        btn.innerText = `🚀 开始生成 (需 ${cost} 积分)`;
    }

    async function login() {
        const pwd = document.getElementById('passwordInput').value.trim();
        if (!pwd) { document.getElementById('loginError').innerText='请输入密码'; return; }
        try {
            const r = await fetch('/api/login',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({password:pwd})});
            const d = await r.json();
            if (d.success) {
                currentPassword = pwd;
                localStorage.setItem('savedPwd',pwd);
                document.getElementById('userName').innerText=d.name;
                document.getElementById('credits').innerText=d.credits;
                document.getElementById('creditValue').innerText=d.credits;
                document.getElementById('totalGenerated').innerText=d.totalGenerated;
                document.getElementById('loginContainer').style.display='none';
                document.getElementById('mainApp').style.display='block';
                loadHistory();
            } else {
                document.getElementById('loginError').innerText=d.error;
            }
        } catch(e) {
            document.getElementById('loginError').innerText='连接失败';
        }
    }

    function logout() {
        currentPassword=null;
        localStorage.removeItem('savedPwd');
        document.getElementById('loginContainer').style.display='flex';
        document.getElementById('mainApp').style.display='none';
    }

    function handleImageUpload(files) {
        for(let f of files) {
            if (!f.type.startsWith('image/')) continue;
            const reader = new FileReader();
            reader.onload=e=>{
                uploadedImages.push({file:f,data:e.target.result});
                renderRefs();
            };
            reader.readAsDataURL(f);
        }
    }

    function renderRefs() {
        const c = document.getElementById('refList');
        c.innerHTML='';
        uploadedImages.forEach((img,i)=>{
            const d=document.createElement('div');
            d.className='ref-item';
            d.draggable=true;
            d.innerHTML=`<span class="drag-handle">⋮⋮</span><img src="${img.data}" onclick="previewImg(${i})"><div class="ref-info">图 ${i+1}</div><button class="remove-ref" onclick="removeImg(${i})">✕</button>`;
            c.appendChild(d);
        });
    }

    function removeImg(i) { uploadedImages.splice(i,1); renderRefs(); }
    function clearAllImages() { uploadedImages=[]; renderRefs(); }

    async function generateImage() {
    const prompt = document.getElementById('promptInput').value.trim();
    if (!prompt) { alert('请输入描述'); return; }
    if (!currentPassword) { alert('请登录'); return; }
    if (activeRequests > 0) { alert('正在生成中，请等待完成！'); return; }

    activeRequests++;
    const box = document.createElement('div');
    box.className = 'result-item';
    box.innerHTML = `
        <div class="result-header">生成中</div>
        <div class="loading">
            <div class="spinner"></div>
            <p>4K 可能需要 1-3 分钟，请耐心等待</p>
            <small>请勿刷新或重复点击</small>
        </div>
    `;
    document.getElementById('resultArea').prepend(box);

    try {
        const formData = new FormData();
        formData.append('prompt', prompt);
        formData.append('size', selectedSize);
        formData.append('ratio', selectedRatio);
        formData.append('model', selectedModel);
        uploadedImages.forEach(img => formData.append('images', img.file));

        // 关键：用原来的 /api/generate 接口，和后端同步
        const controller = new AbortController();
        const timeout = setTimeout(() => controller.abort(), 600000); // 10分钟超时

        const response = await fetch('/api/generate', {
            method: 'POST',
            headers: { 'X-Password': currentPassword },
            body: formData,
            signal: controller.signal
        });

        clearTimeout(timeout);
        const data = await response.json();

        if (!data.success) throw new Error(data.error);

        const url = data.image + '?t=' + Date.now();
        historyImages.unshift({ url, prompt: prompt.substring(0, 50) });
        if (historyImages.length > 20) historyImages = historyImages.slice(0, 20);
        saveHistory();

        box.innerHTML = `
            <div class="result-header">✅ 生成成功</div>
            <div class="result-image">
                <img src="${url}" crossorigin="anonymous" onclick="openModalWithImage('${url}')" style="max-width:100%">
            </div>
            <div style="text-align:center;padding:10px;color:var(--text-muted);font-size:12px">双击图片放大</div>
        `;

        document.getElementById('credits').innerText = data.credits;
        document.getElementById('creditValue').innerText = data.credits;

    } catch (e) {
        let msg = e.message;
        if (msg.includes('abort')) msg = '请求超时，4K生成较慢，请重试';
        if (msg.includes('fetch')) msg = '服务器连接断开，请重试';
        box.innerHTML = `
            <div class="result-header">❌ 生成失败</div>
            <div class="error">${msg}</div>
        `;
    } finally {
        activeRequests--;
    }
}
    async function loadUserStats() {
        if (!currentPassword) return;
        try {
            const r=await fetch('/api/stats',{headers:{'X-Password':currentPassword}});
            const d=await r.json();
            if (d.success) {
                document.getElementById('credits').innerText=d.credits;
                document.getElementById('creditValue').innerText=d.credits;
                document.getElementById('totalGenerated').innerText=d.totalGenerated;
            }
        }catch(e){}
    }

    function saveHistory() { localStorage.setItem('history_'+currentPassword,JSON.stringify(historyImages)); }
    function loadHistory() { try{historyImages=JSON.parse(localStorage.getItem('history_'+currentPassword))||[];}catch(e){} renderHistory(); }
    function clearHistory() { historyImages=[]; saveHistory(); renderHistory(); }

    function renderHistory() {
        const c=document.getElementById('historyList');
        if (historyImages.length===0) { c.innerHTML='<div style="grid-column:1/-1;text-align:center;padding:20px">暂无记录</div>'; return; }
        c.innerHTML=historyImages.map((h,i)=>`
        <div class="history-img-item" onclick="openModalWithImage('${h.url}')">
            <img src="${h.url}?t=${Date.now()}" crossorigin="anonymous">
            <div class="history-prompt">${h.prompt||'图片'}</div>
        </div>`).join('');
    }

    function openModalWithImage(src) {
        document.getElementById('imageModal').style.display='flex';
        document.getElementById('modalImage').src=src;
        currentZoom=1;
        document.getElementById('modalImage').style.transform='scale(1)';
        document.getElementById('zoomLevel').innerText='100%';
    }

    function closeModal(e) {
        if (e && e.target!==document.getElementById('imageModal') && e.target.className!=='modal-close') return;
        document.getElementById('imageModal').style.display='none';
    }

    function zoomIn(e) { e.stopPropagation(); currentZoom=Math.min(currentZoom+0.2,3); updateZoom(); }
    function zoomOut(e) { e.stopPropagation(); currentZoom=Math.max(currentZoom-0.2,0.5); updateZoom(); }
    function resetZoom(e) { e.stopPropagation(); currentZoom=1; updateZoom(); }
    function updateZoom() {
        document.getElementById('modalImage').style.transform=`scale(${currentZoom})`;
        document.getElementById('zoomLevel').innerText=Math.round(currentZoom*100)+'%';
    }

    function toggleTheme() {
        document.body.classList.toggle('white-theme');
        const b=document.getElementById('themeToggle');
        b.innerText=document.body.classList.contains('white-theme')?'☀️ 浅色':'🌙 深色';
    }

    document.querySelectorAll('#sizeOptions .size-btn').forEach(b=>{
        b.addEventListener('click',()=>{
            document.querySelectorAll('#sizeOptions .size-btn').forEach(x=>x.classList.remove('active'));
            b.classList.add('active');
            selectedSize=b.dataset.size;
            updateButtonCost();
        });
    });

    document.querySelectorAll('#ratioOptions .ratio-btn').forEach(b=>{
        b.addEventListener('click',()=>{
            document.querySelectorAll('#ratioOptions .ratio-btn').forEach(x=>x.classList.remove('active'));
            b.classList.add('active');
            selectedRatio=b.dataset.ratio;
        });
    });

    document.getElementById('modelSelect').addEventListener('change',e=>{
        selectedModel=e.target.value;
        updateButtonCost();
    });

    document.getElementById('promptInput').addEventListener('input',e=>{
        document.getElementById('charCount').innerText=e.target.value.length;
    });

    window.addEventListener('paste',e=>{
        if (!currentPassword) return;
        const items=e.clipboardData?.items;
        if (!items) return;
        for(let i of items) {
            if (i.kind==='file' && i.type.startsWith('image/')) {
                const f=i.getAsFile();
                const reader=new FileReader();
                reader.onload=ev=>{uploadedImages.push({file:f,data:ev.target.result}); renderRefs();};
                reader.readAsDataURL(f);
                break;
            }
        }
    });

    window.onload=()=>{
        const p=localStorage.getItem('savedPwd');
        if (p) {
            document.getElementById('passwordInput').value=p;
            login();
        }
        updateButtonCost();
    };
</script>
</body>
