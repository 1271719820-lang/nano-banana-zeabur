<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>天才新星 - 最终稳定版</title>
<style>
* {margin:0;padding:0;box-sizing:border-box;}
:root{
  --bg:#121212;--bg2:#1e1e1e;--bg3:#2d2d2d;
  --text:#e0e0e0;--muted:#888;--accent:#a855f7;
  --border:#333;--success:#10b981;--error:#ef4444;
}
body{background:var(--bg);color:var(--text);font-family:Segoe UI,sans-serif;}
.container{max-width:1200px;margin:0 auto;padding:20px;}
.header{display:flex;justify-content:space-between;align-items:center;padding:15px 0;border-bottom:1px solid var(--border);}
.logo{font-size:1.5rem;font-weight:700;color:var(--accent);}
.user-info{display:flex;gap:15px;align-items:center;}
.btn{padding:8px 16px;border:none;border-radius:8px;background:var(--accent);color:#fff;cursor:pointer;}
.btn-secondary{background:var(--bg3);border:1px solid var(--border);color:var(--text);}
.card{background:var(--bg2);border-radius:16px;padding:20px;margin-top:20px;border:1px solid var(--border);}
.grid{display:grid;grid-template-columns:260px 1fr 280px;gap:20px;}
@media(max-width:1000px){.grid{grid-template-columns:1fr;}}

.form-group{margin-bottom:15px;}
label{display:block;margin-bottom:6px;color:var(--muted);font-size:0.9rem;}
select,textarea{width:100%;padding:10px;background:var(--bg3);border:1px solid var(--border);border-radius:8px;color:var(--text);}
textarea{min-height:120px;resize:vertical;}

.upload-area{border:2px dashed var(--border);border-radius:12px;padding:20px;text-align:center;background:var(--bg3);cursor:pointer;}
.ref-list{margin-top:10px;display:flex;gap:8px;flex-wrap:wrap;max-height:180px;overflow:auto;}
.ref-item{width:50px;height:50px;border-radius:6px;overflow:hidden;position:relative;border:1px solid var(--border);}
.ref-item img{width:100%;height:100%;object-fit:cover;}
.ref-item button{position:absolute;top:0;right:0;background:#0008;color:#fff;border:none;width:18px;height:18px;cursor:pointer;}

.size-buttons,.ratio-buttons{display:flex;gap:8px;flex-wrap:wrap;margin:10px 0;}
.size-btn,.ratio-btn{padding:6px 14px;background:var(--bg3);border:1px solid var(--border);border-radius:20px;cursor:pointer;font-size:0.85rem;}
.size-btn.active,.ratio-btn.active{background:var(--accent);border-color:var(--accent);color:#fff;}

.gen-btn{width:100%;padding:14px;border:none;border-radius:12px;background:var(--accent);color:#fff;font-size:1rem;font-weight:bold;cursor:pointer;margin-top:10px;}
.result-item{margin:12px 0;padding:12px;background:var(--bg3);border-radius:10px;border:1px solid var(--border);}
.error{color:var(--error);}
.success{color:var(--success);}

.history-tip{color:#fbbf24;font-size:0.8rem;margin:8px 0;text-align:center;}
.history-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;max-height:300px;overflow:auto;margin-top:10px;}
.history-item{aspect-ratio:1;border-radius:8px;overflow:hidden;border:1px solid var(--border);cursor:pointer;}
.history-item img{width:100%;height:100%;object-fit:cover;}

/* 大图弹窗+缩放 */
.modal{position:fixed;inset:0;background:#000d;display:none;z-index:9999;align-items:center;justify-content:center;}
.modal img{max-width:90vw;max-height:90vh;cursor:zoom-in;transition:transform 0.2s;}
</style>
</head>
<body>
<div class="container">
  <div class="header">
    <div class="logo">✨ AI绘图稳定版</div>
    <div class="user-info">
      <span>💰 积分：<span id="creditValue">0</span></span>
      <button class="btn btn-secondary" onclick="logout()">退出</button>
    </div>
  </div>

  <div class="grid">
    <!--左侧-->
    <div class="card">
      <div class="form-group">
        <label>选择模型</label>
        <select id="modelSel">
          <option value="nano-banana-fast">Fast 省钱</option>
          <option value="nano-banana-pro">Pro 高清</option>
          <option value="nano-banana-2">Banana2 均衡</option>
        </select>
      </div>
      <div class="form-group">
        <label>当前消耗积分</label>
        <div id="nowCost">5</div>
      </div>
    </div>

    <!--中间主生成-->
    <div class="card">
      <div class="form-group">
        <label>参考图（最多3张）</label>
        <div class="upload-area" onclick="document.getElementById('fileIn').click()">点击上传 / 粘贴图片</div>
        <input id="fileIn" type="file" multiple accept="image/*" style="display:none" onchange="onUpload(this.files)">
        <div class="ref-list" id="refList"></div>
      </div>

      <div class="form-group">
        <label>提示词</label>
        <textarea id="prompt"></textarea>
      </div>

      <div class="form-group">
        <label>画质尺寸</label>
        <div class="size-buttons">
          <div class="size-btn active" data-s="1K">1K</div>
          <div class="size-btn" data-s="2K">2K</div>
          <div class="size-btn" data-s="4K">4K</div>
        </div>
        <label>画面比例</label>
        <div class="ratio-buttons" id="ratioButtons">
          <div class="ratio-btn" data-r="1:1">1:1</div>
          <div class="ratio-btn" data-r="16:9">16:9</div>
          <div class="ratio-btn" data-r="9:16">9:16</div>
          <div class="ratio-btn" data-r="4:3">4:3</div>
          <div class="ratio-btn" data-r="3:4">3:4</div>
          <div class="ratio-btn" data-r="3:2">3:2</div>
          <div class="ratio-btn" data-r="2:3">2:3</div>
          <div class="ratio-btn" data-r="21:9">21:9</div>
          <div class="ratio-btn" data-r="original">📐 原始比例</div>
        </div>
      </div>

      <button class="gen-btn" onclick="doGenerate()">🚀 开始生成</button>
      <div id="resultArea"></div>
    </div>

    <!--右侧历史-->
    <div class="card">
      <div class="form-group">
        <label>我的信息</label>
        <div>总生成：<span id="totalCnt">0</span></div>
      </div>
      <hr style="margin:15px 0;border-color:var(--border)">
      <div class="form-group">
        <label>历史记录</label>
        <div class="history-tip">⚠️ 重要图片及时保存，刷新会清空</div>
        <button class="btn btn-secondary" style="width:100%;margin:8px 0" onclick="clearHistory()">清空历史</button>
        <div class="history-grid" id="historyGrid"></div>
      </div>
    </div>
  </div>
</div>

<!--大图弹窗（双击放大+滚轮缩放）-->
<div class="modal" id="imgModal" onclick="closeModal()">
  <img id="modalImg" src="">
</div>

<script>
//全局
let currentPwd = localStorage.getItem("aiPwd") || "";
let selModel = "nano-banana-fast";
let selSize = "1K";
let selRatio = "1:1";
let uploadFiles = [];
let uploadPre = [];
let historyList = JSON.parse(localStorage.getItem("aiHistory")||"[]");
let scale = 1;

//价格表
const priceMap = {
  "nano-banana-fast":{"1K":4,"2K":5,"4K":6},
  "nano-banana-pro":{"1K":6,"2K":8,"4K":12},
  "nano-banana-2":{"1K":4,"2K":6,"4K":10}
};

//预设比例映射（用于原始比例匹配）
const ratioMap = {
  "1:1": 1,
  "4:3": 4/3,
  "3:4": 3/4,
  "16:9": 16/9,
  "9:16": 9/16,
  "3:2": 1.5,
  "2:3": 2/3,
  "21:9": 21/9
};

//初始化
window.onload = async ()=>{
  if(!currentPwd){
    let p = prompt("请输入登录密码：");
    if(!p)return;
    currentPwd = p;
    localStorage.setItem("aiPwd",p);
  }
  bindBtns();
  updateCost();
  await loadUserInfo();
  renderHistory();
};

//绑定按钮
function bindBtns(){
  //尺寸
  document.querySelectorAll(".size-btn").forEach(b=>{
    b.onclick=()=>{
      document.querySelectorAll(".size-btn").forEach(x=>x.classList.remove("active"));
      b.classList.add("active");
      selSize = b.dataset.s;
      updateCost();
    };
  });
  //比例（包括原始比例）
  document.querySelectorAll(".ratio-btn").forEach(b=>{
    b.onclick=()=>{
      // 清除所有高亮
      document.querySelectorAll(".ratio-btn").forEach(x=>x.classList.remove("active"));
      b.classList.add("active");
      selRatio = b.dataset.r;
    };
  });
  //模型
  document.getElementById("modelSel").onchange = e=>{
    selModel = e.target.value;
    updateCost();
  };
}

function updateCost(){
  let c = priceMap[selModel][selSize];
  document.getElementById("nowCost").innerText = c;
}

//加载用户
async function loadUserInfo(){
  try{
    let res = await fetch("/api/stats",{headers:{"X-Password":currentPwd}});
    let d = await res.json();
    if(d.success){
      document.getElementById("creditValue").innerText = d.credits;
      document.getElementById("totalCnt").innerText = d.totalGenerated;
    }
  }catch(e){console.error(e);}
}

//上传图片
function onUpload(files){
  for(let f of files){
    if(uploadFiles.length>=3)break;
    let reader = new FileReader();
    reader.onload=ev=>{
      uploadFiles.push(f);
      uploadPre.push(ev.target.result);
      renderRef();
    };
    reader.readAsDataURL(f);
  }
}
function renderRef(){
  let box = document.getElementById("refList");
  box.innerHTML="";
  uploadPre.forEach((src,i)=>{
    let div = document.createElement("div");
    div.className="ref-item";
    div.innerHTML = `<img src="${src}"><button onclick="delRef(${i})">×</button>`;
    box.appendChild(div);
  });
}
function delRef(i){
  uploadFiles.splice(i,1);
  uploadPre.splice(i,1);
  renderRef();
}

// 辅助：根据参考图自动匹配比例
async function autoMatchRatioFromRef() {
  if (uploadFiles.length === 0) {
    alert("请先上传参考图，才能使用原始比例");
    return false;
  }
  // 获取第一张参考图的原始尺寸
  const img = new Image();
  img.src = uploadPre[0];
  await new Promise((resolve, reject) => {
    img.onload = resolve;
    img.onerror = reject;
  });
  const ratioValue = img.width / img.height;
  // 寻找最接近的预设比例
  let bestKey = "1:1";
  let minDiff = Infinity;
  for (const [key, val] of Object.entries(ratioMap)) {
    const diff = Math.abs(val - ratioValue);
    if (diff < minDiff) {
      minDiff = diff;
      bestKey = key;
    }
  }
  // 更新UI高亮
  document.querySelectorAll(".ratio-btn").forEach(btn => {
    btn.classList.remove("active");
    if (btn.dataset.r === bestKey) btn.classList.add("active");
  });
  selRatio = bestKey;
  return true;
}

//核心生成（对接后端/api/generate）
async function doGenerate(){
  let prompt = document.getElementById("prompt").value.trim();
  if(!prompt)return alert("请输入提示词");

  // 处理原始比例
  if (selRatio === "original") {
    const ok = await autoMatchRatioFromRef();
    if (!ok) return; // 无参考图时已提示
  }

  let resBox = document.getElementById("resultArea");
  resBox.innerHTML = `<div class="result-item">生成中，请耐心等待（4K较慢）...</div>`;

  let fd = new FormData();
  fd.append("prompt",prompt);
  fd.append("size",selSize);
  fd.append("ratio",selRatio);
  fd.append("model",selModel);
  uploadFiles.forEach(f=>fd.append("images",f));

  try{
    let ctrl = new AbortController();
    let t = setTimeout(()=>ctrl.abort(),180000);

    let resp = await fetch("/api/generate",{
      method:"POST",
      headers:{"X-Password":currentPwd},
      body:fd,
      signal:ctrl.signal
    });
    clearTimeout(t);

    let data = await resp.json();
    if(!data.success)throw new Error(data.error||"生成失败");

    //更新积分
    document.getElementById("creditValue").innerText = data.credits;

    //展示结果
    let imgUrl = data.image+"?t="+Date.now();
    resBox.innerHTML = `
      <div class="result-item success">✅ 生成成功</div>
      <div style="margin:10px 0">
        <img src="${imgUrl}" style="max-width:100%;border-radius:8px" ondblclick="openModal('${imgUrl}')">
        <div style="font-size:0.8rem;color:var(--muted);margin-top:6px">双击图片放大查看</div>
      </div>
    `;

    //存入历史
    historyList.unshift({url:imgUrl,txt:prompt.substring(0,40)});
    if(historyList.length>20)historyList=historyList.slice(0,20);
    localStorage.setItem("aiHistory",JSON.stringify(historyList));
    renderHistory();

  }catch(e){
    let msg = e.message||"服务器连接断开，请重试";
    if(msg.includes("abort"))msg="请求超时/连接断开，请重试";
    resBox.innerHTML = `<div class="result-item error">❌ ${msg}</div>`;
  }
}

//大图弹窗：双击打开、滚轮缩放、点击关闭
function openModal(url){
  scale=1;
  let m = document.getElementById("imgModal");
  let img = document.getElementById("modalImg");
  img.src=url;
  img.style.transform = `scale(${scale})`;
  m.style.display="flex";
}
function closeModal(){
  document.getElementById("imgModal").style.display="none";
}
//滚轮缩放
document.getElementById("imgModal").addEventListener("wheel",e=>{
  e.preventDefault();
  scale += e.deltaY>0 ? -0.1 : 0.1;
  if(scale<0.3)scale=0.3;
  if(scale>3)scale=3;
  document.getElementById("modalImg").style.transform = `scale(${scale})`;
});

//历史
function renderHistory(){
  let box = document.getElementById("historyGrid");
  if(historyList.length===0){
    box.innerHTML = `<div style="grid-column:1/-1;text-align:center;color:var(--muted)">暂无记录</div>`;
    return;
  }
  box.innerHTML = historyList.map(item=>`
    <div class="history-item" ondblclick="openModal('${item.url}')">
      <img src="${item.url}">
    </div>
  `).join("");
}
function clearHistory(){
  historyList=[];
  localStorage.removeItem("aiHistory");
  renderHistory();
}

//退出
function logout(){
  localStorage.removeItem("aiPwd");
  location.reload();
}

//粘贴传图
document.addEventListener("paste",e=>{
  let items = e.clipboardData.items;
  for(let it of items){
    if(it.kind==="file"&&it.type.startsWith("image/")){
      let f = it.getAsFile();
      let reader = new FileReader();
      reader.onload=ev=>{
        if(uploadFiles.length>=3)return;
        uploadFiles.push(f);
        uploadPre.push(ev.target.result);
        renderRef();
      };
      reader.readAsDataURL(f);
      break;
    }
  }
});
</script>
</body>
</html>
